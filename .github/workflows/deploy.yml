name: Deploy Nuxt 3 to GitHub Pages

on:
  push:
    branches: [ main ]   # change if your default branch isn't main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # If you use pnpm or yarn, replace these 2 steps accordingly.
      - name: Install deps
        run: npm ci

      - name: Generate static site
        env:
          # Ensures Nuxt generates a Pages-friendly output (adds 404.html, .nojekyll, etc.)
          NITRO_PRESET: github_pages
        run: npm run generate

      - name: Make sure .nojekyll exists
        run: touch .output/public/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
